<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - Planneria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: lavenderblush;
    }

    h1 {
      color: palevioletred;
      text-align: center;
    }

    .pink-btn {
      background: palevioletred;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-weight: bold;
    }

    .pink-btn:hover {
      background: rgb(216, 112, 147);
      color: white;
    }

    .task-done {
      text-decoration: line-through;
      color: #aaa;
    }

    .footer-card-container {
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg" style="background: palevioletred;">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">Planneria</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">

          <li class="nav-item">
            <a class="nav-link text-white" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white" href="studynotes.html">Study Notes</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white" href="timetable.html">Timetable</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white fw-bold active"
               style="background: plum; border-radius: 5px;"
               href="tasks.html">Tasks</a>
          </li>

          <!-- Progress Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown" href="#">
              Progress
            </a>
            <ul class="dropdown-menu p-3" style="min-width: 200px;">
              <label class="mb-1 fw-bold">Task Progress</label>
              <div class="progress">
                <div class="progress-bar bg-success"
                     id="progressBar"
                     style="width: 0%;">0%</div>
              </div>
            </ul>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE TITLE -->
  <h1 class="mt-4">TO-DO List ✅</h1>

  <!-- TASK INPUT + LIST -->
  <div class="container mt-4">

    <div class="input-group mb-3">
      <input type="text" id="taskInput" class="form-control" placeholder="Enter a new task...">
      <button class="pink-btn ms-2" onclick="addTask()">Add</button>
    </div>

    <div id="taskList"></div>

  </div>

  <!-- FOOTER -->
  <div class="container-fluid">
    <div class="card w-100 text-center footer-card-container" style="background: plum;">
      <div class="card-header fw-bold fs-5" style="background: palevioletred; color: white;">
        PLANNERIA
      </div>
      <div class="card-body">
        <h5>Contact us</h5>
        <p>📞 +91 93078236789</p>
        <p>✉️ divyajyothi.bonam@gmail.com</p>
        <h4>💕 Made with Love by Divya.B 💕</h4>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API = "http://127.0.0.1:5000";

    // Get logged-in user from localStorage
    const userId = localStorage.getItem("user_id");

    // Redirect to login if not logged in
    if (!userId) {
      window.location.href = "login.html";
    }

    // -------- Update Progress Bar --------
    function updateProgress() {
      const allCheckboxes = document.querySelectorAll('.task-checkbox');
      const checkedCheckboxes = document.querySelectorAll('.task-checkbox:checked');

      const total = allCheckboxes.length;
      const done = checkedCheckboxes.length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);

      const bar = document.getElementById('progressBar');
      bar.style.width = pct + '%';
      bar.textContent = pct + '%';
    }

    // -------- Render a Single Task --------
    function renderTask(id, text, status) {
      const isCompleted = status === "completed";

      const div = document.createElement('div');
      div.className = 'input-group mb-3';

      div.innerHTML = `
        <div class="input-group-text">
          <input type="checkbox" class="task-checkbox"
            ${isCompleted ? "checked" : ""}
            onchange="handleCheck(this, ${id})">
        </div>
        <input type="text" class="form-control task-text ${isCompleted ? 'task-done' : ''}"
               value="${text}" readonly>
        <button class="pink-btn" onclick="deleteTask(this, ${id})">Delete</button>
      `;

      document.getElementById('taskList').appendChild(div);
      updateProgress();
    }

    // -------- Load All Tasks --------
    function loadTasks() {
      fetch(`${API}/tasks/${userId}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('taskList').innerHTML = "";
          data.forEach(task => renderTask(task.id, task.task, task.status));
        })
        .catch(err => console.error("Failed to load tasks:", err));
    }

    // -------- Add New Task --------
    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();

      if (text === "") {
        alert("Please enter a task.");
        return;
      }

      fetch(`${API}/add_task`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          task: text,
          status: "pending"
        })
      })
        .then(res => res.json())
        .then(() => {
          input.value = "";
          loadTasks();
        })
        .catch(err => console.error("Failed to add task:", err));
    }

    // -------- Check / Uncheck Task --------
    function handleCheck(checkbox, id) {
      const textInput = checkbox.closest('.input-group').querySelector('.task-text');
      const status = checkbox.checked ? "completed" : "pending";

      if (checkbox.checked) {
        textInput.classList.add('task-done');
      } else {
        textInput.classList.remove('task-done');
      }

      fetch(`${API}/update_task/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: status })
      })
        .catch(err => console.error("Failed to update task:", err));

      updateProgress();
    }

    // -------- Delete Task --------
    function deleteTask(btn, id) {
      fetch(`${API}/delete_task/${id}`, {
        method: "DELETE"
      })
        .then(() => {
          btn.closest('.input-group').remove();
          updateProgress();
        })
        .catch(err => console.error("Failed to delete task:", err));
    }

    // -------- Start: Load tasks on page load --------
    window.onload = loadTasks;
  </script>

</body>
</html>
