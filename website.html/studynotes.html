<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Notes - Planneria</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background-color: lavenderblush;
    }

    h1 {
      text-align: center;
      margin-top: 50px;
      font-weight: bold;
      color: palevioletred;
    }

    #notesArea {
      min-height: 200px;
      background-color: #fffafc;
      border: 2px solid palevioletred;
      border-radius: 10px;
      padding: 15px;
    }

    .pink-btn {
      background-color: plum;
      border-radius: 80px;
      border: none;
      padding: 10px 30px;
      font-weight: bold;
    }

    .pink-btn:hover {
      background-color: palevioletred;
      color: white;
      transform: scale(1.05);
    }

    .navbar .nav-link:hover {
      background-color: white;
      color: palevioletred !important;
      border-radius: 5px;
      transition: 0.3s;
    }

    .footer-card-container {
      margin-top: 60px;
      padding: 0 15px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg" style="background-color: palevioletred;">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">Planneria</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav me-auto">

          <li class="nav-item">
            <a class="nav-link text-white" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white fw-bold active"
               style="background-color: plum; border-radius: 5px;"
               href="studynotes.html">Study Notes</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white" href="timetable.html">Timetable</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-white" href="tasks.html">Tasks</a>
          </li>

          <!-- Progress Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">
              Progress
            </a>
            <ul class="dropdown-menu p-3" style="min-width: 200px;">
              <label class="mb-1 fw-bold">Task Progress</label>
              <div class="progress">
                <div class="progress-bar bg-success" style="width: 50%;">50%</div>
              </div>
            </ul>
          </li>

        </ul>

        <!-- Search -->
        <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search"/>
          <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- PAGE TITLE -->
  <h1>📝 Your Study Notes</h1>

  <!-- NOTES SECTION -->
  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <label class="fw-bold">Date:</label>
        <input type="date" id="noteDate" class="form-control mb-3"/>

        <div id="notesArea" contenteditable="true">
          ✨ Type your notes here...
        </div>

        <div class="text-center mt-3">
          <button class="pink-btn" onclick="saveNote()">Save 🤍</button>
        </div>

        <!-- Saved Notes Display -->
        <div id="savedNotes" class="mt-4"></div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="container-fluid">
    <div class="card w-100 text-center footer-card-container" style="background-color: plum;">
      <div class="card-header fw-bold fs-5" style="background-color: palevioletred; color: white;">
        PLANNERIA
      </div>
      <div class="card-body p-3">
        <h5>Contact us</h5>
        <h6>📞 Phone</h6>
        <p>+91 93078236789</p>
        <h6>✉️ Email</h6>
        <p>divyajyothi.bonam@gmail.com</p>
        <h6>Follow us</h6>
        <div class="d-flex justify-content-center gap-3">
          <a href="#" class="text-dark">Instagram</a>
          <a href="#" class="text-dark">Facebook</a>
          <a href="#" class="text-dark">Twitter</a>
        </div>
        <h4 class="mt-3">💕 Made with Love by Divya.B 💕</h4>
        <a href="#" class="btn btn-primary mt-2">Send message</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API = "http://127.0.0.1:5000";

    // Get logged-in user from localStorage
    const userId = localStorage.getItem("user_id");

    // Redirect to login if not logged in
    if (!userId) {
      window.location.href = "login.html";
    }

    // -------- Render a Single Note Card --------
    function renderNote(id, title, content) {
      const container = document.getElementById("savedNotes");

      const card = document.createElement("div");
      card.className = "card p-3 mb-3";

      card.innerHTML = `
        <b>${title}</b>
        <p style="white-space: pre-wrap;" class="mt-2">${content}</p>
        <div class="text-end">
          <button class="pink-btn" onclick="deleteNote(this, ${id})">Delete ❌</button>
        </div>
      `;

      container.appendChild(card);
    }

    // -------- Load All Notes for This User --------
    function loadNotes() {
      fetch(`${API}/notes/${userId}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("savedNotes").innerHTML = "";
          data.forEach(note => renderNote(note.id, note.title, note.content));
        })
        .catch(err => console.error("Failed to load notes:", err));
    }

    // -------- Save a New Note --------
    function saveNote() {
      const content = document.getElementById("notesArea").innerText.trim();
      const date = document.getElementById("noteDate").value;

      if (content === "" || date === "") {
        alert("Please enter a date and note content ❗");
        return;
      }

      fetch(`${API}/add_note`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          title: date,
          content: content
        })
      })
        .then(res => res.json())
        .then(() => {
          document.getElementById("notesArea").innerText = "✨ Type your notes here...";
          document.getElementById("noteDate").value = "";
          loadNotes();
        })
        .catch(err => console.error("Failed to save note:", err));
    }

    // -------- Delete a Note --------
    function deleteNote(btn, id) {
      if (!confirm("Are you sure you want to delete this note?")) {
        return;
      }

      fetch(`${API}/delete_note/${id}`, {
        method: "DELETE"
      })
        .then(() => {
          btn.closest(".card").remove();
        })
        .catch(err => console.error("Failed to delete note:", err));
    }

    // -------- Start: Load notes on page load --------
    window.onload = loadNotes;
  </script>

</body>
</html>
