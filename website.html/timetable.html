<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timetable - Planneria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --pink: palevioletred;
      --pink-dark: rgb(180, 80, 120);
      --pink-hover: rgb(216, 112, 147);
      --plum: plum;
      --bg: lavenderblush;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    h1 {
      color: var(--pink);
      text-align: center;
      margin-top: 20px;
      font-weight: 700;
    }

    /* ── NAVBAR ── */
    .navbar { background: var(--pink) !important; }

    /* ── BUTTONS ── */
    .pink-btn {
      background: var(--pink);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-weight: bold;
      margin: 3px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    .pink-btn:hover { background: var(--pink-hover); color: white; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      transition: background .15s;
    }
    .icon-btn:hover { background: rgba(0,0,0,.08); }
    .icon-btn.del { color: #c0392b; }
    .icon-btn.edit { color: var(--pink-dark); }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      margin-top: 18px;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(188,93,132,.13);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      min-width: 500px;
    }

    thead tr { background: var(--pink); }

    thead th {
      color: white;
      font-weight: 700;
      padding: 10px 12px;
      text-align: center;
      white-space: nowrap;
      font-size: 13px;
      position: relative;
      min-width: 110px;
    }

    thead th:first-child { min-width: 130px; }

    tbody tr:nth-child(even) { background: #fdf0f4; }
    tbody tr:hover { background: #fce4ec; transition: background .12s; }

    td {
      text-align: center;
      padding: 6px 8px;
      border-bottom: 1px solid #f8d7e3;
      font-size: 13px;
      vertical-align: middle;
    }

    td:first-child {
      font-weight: 600;
      color: var(--pink-dark);
      white-space: nowrap;
      padding-left: 12px;
    }

    td input {
      width: 100%;
      border: none;
      outline: none;
      text-align: center;
      background: transparent;
      font-size: 13px;
      font-family: inherit;
      color: #333;
      padding: 4px 2px;
      border-radius: 6px;
      transition: background .15s;
    }

    td input:focus {
      background: #fce4ec;
      outline: none;
    }

    /* ── HEADER CELL CONTROLS ── */
    .th-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .th-inner span { flex: 1; cursor: default; }

    .th-ctrl { display: flex; gap: 2px; }

    .th-ctrl .icon-btn { color: white; font-size: 13px; }
    .th-ctrl .icon-btn:hover { background: rgba(255,255,255,.2); }

    /* ── DAY CELL CONTROLS ── */
    .day-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .day-label { flex: 1; text-align: left; }
    .day-ctrl { display: flex; gap: 2px; flex-shrink: 0; }

    /* ── ADD ROW ── */
    .add-row { background: #fdf0f4 !important; }
    .add-row td { border-bottom: none; }

    /* ── CONTROLS PANEL ── */
    .ctrl-panel {
      background: white;
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(188,93,132,.10);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      margin-top: 16px;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-group label { font-size: 12px; font-weight: 600; color: var(--pink-dark); }

    .ctrl-group input {
      border: 2px solid #f0c0d0;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: border .15s;
    }

    .ctrl-group input:focus { border-color: var(--pink); }

    /* ── STATUS ── */
    #statusMsg {
      text-align: center;
      margin-top: 8px;
      font-size: 13px;
      color: #2e7d32;
      font-weight: 600;
      min-height: 20px;
    }

    /* ── EDIT INLINE ── */
    .editing-input {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 2px solid white;
      border-radius: 8px;
      background: rgba(255,255,255,.18);
      color: white;
      padding: 2px 6px;
      outline: none;
      width: 90px;
    }

    /* ── FOOTER ── */
    .footer-card-container { margin-top: 60px; }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand text-white fw-bold" href="index.html">Planneria</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="studynotes.html">Study Notes</a></li>
        <li class="nav-item">
          <a class="nav-link text-white fw-bold active"
             style="background: plum; border-radius: 5px;" href="timetable.html">Timetable</a>
        </li>
        <li class="nav-item"><a class="nav-link text-white" href="tasks.html">Tasks</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown" href="#">Progress</a>
          <ul class="dropdown-menu p-3" style="min-width:200px;">
            <label class="mb-1 fw-bold">Task Progress</label>

        </li>
      </ul>

  </div>
</nav>

<h1>📅 Timetable</h1>

<div class="container" style="max-width:960px;">

  <!-- CONTROLS -->
  <div class="ctrl-panel">
    <!-- Add Day -->
    <div class="ctrl-group">
      <label>Day Name</label>
      <input id="dayInput" placeholder="e.g. Saturday" style="width:150px;">
    </div>
    <button class="pink-btn" onclick="addDay()">+ Add Day</button>

    <div style="width:1px; background:#f0c0d0; align-self:stretch; margin:0 4px;"></div>

    <!-- Add Time -->
    <div class="ctrl-group">
      <label>Time Slot</label>
      <input id="timeInput" placeholder="e.g. 9:00 AM" style="width:150px;">
    </div>
    <button class="pink-btn" onclick="addTime()">+ Add Time</button>

    <div style="margin-left:auto; display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
      <button class="pink-btn" onclick="saveTimetable()" style="background:#2e7d32;">💾 Save All</button>
    </div>
  </div>

  <div id="statusMsg"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="timetable">
      <thead>
        <tr>
          <th>
            <div class="th-inner"><span>Day / Time</span></div>
          </th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<!-- FOOTER -->
<div class="container-fluid footer-card-container">
  <div class="card w-100 text-center" style="background: plum;">
    <div class="card-header fw-bold fs-5" style="background: palevioletred; color: white;">PLANNERIA</div>
    <div class="card-body">
      <h5>Contact us</h5>
      <p>📞 +91 93078236789</p>
      <p>✉️ divyajyothi.bonam@gmail.com</p>
      <h4>💕 Made with Love by Divya.B 💕</h4>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API    = "http://127.0.0.1:5000";
const userId = localStorage.getItem("user_id");
if (!userId) window.location.href = "login.html";

const existingEntries = {};  // key = "day|time" → subject
const DEFAULT_DAYS    = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

/* ── HELPERS ─────────────────────────────── */

function showSaved(msg = "✅ Saved") {
  const el = document.getElementById("statusMsg");
  el.innerText = msg;
  setTimeout(() => el.innerText = "", 1800);
}

function getTimes() {
  return [...document.querySelectorAll("thead th")]
    .slice(1).map(th => th.dataset.time);
}

function getDays() {
  return [...document.querySelectorAll("tbody tr")]
    .map(r => r.dataset.day);
}

/* ── TIME COLUMN ─────────────────────────── */

function buildTimeHeader(time) {
  const th = document.createElement("th");
  th.dataset.time = time;
  th.innerHTML = `
    <div class="th-inner">
      <span>${time}</span>
      <div class="th-ctrl">
        <button class="icon-btn" title="Rename" onclick="renameTime(this)">✏️</button>
        <button class="icon-btn" title="Delete" onclick="deleteTime(this)">✕</button>
      </div>
    </div>`;
  return th;
}

function addTime() {
  const input = document.getElementById("timeInput");
  const time  = input.value.trim();
  if (!time) return alert("Enter a time slot");
  if (getTimes().includes(time)) return alert("Time already exists");

  document.querySelector("thead tr").appendChild(buildTimeHeader(time));

  document.querySelectorAll("tbody tr").forEach(row => {
    row.appendChild(makeSubjectCell(row.dataset.day, time));
  });

  input.value = "";
}

function renameTime(btn) {
  const th    = btn.closest("th");
  const inner = th.querySelector(".th-inner span");
  const old   = th.dataset.time;

  const inp = document.createElement("input");
  inp.className = "editing-input";
  inp.value = old;

  inner.replaceWith(inp);
  inp.focus();
  inp.select();

  const commit = async () => {
    const newTime = inp.value.trim() || old;
    th.dataset.time = newTime;

    const span = document.createElement("span");
    span.textContent = newTime;
    inp.replaceWith(span);

    if (newTime === old) return;

    // rename in all rows (data + server)
    const days = getDays();
    for (const day of days) {
      const key    = day + "|" + old;
      const subj   = existingEntries[key];

      // update header cell reference in rows
      document.querySelectorAll("tbody tr").forEach(row => {
        if (row.dataset.day === day) {
          const idx = getTimes().indexOf(newTime);
          if (idx >= 0) {
            row.cells[idx + 1].dataset.time = newTime;
          }
        }
      });

      if (subj) {
        // delete old entry, create new with new time key
        await fetch(API + "/delete_timetable_entry", {
          method: "DELETE",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ user_id: userId, day, time: old })
        });
        await fetch(API + "/add_timetable", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ user_id: userId, day, time: newTime, subject: subj })
        });
        delete existingEntries[key];
        existingEntries[day + "|" + newTime] = subj;
      }
    }
    showSaved("✅ Time renamed");
  };

  inp.addEventListener("blur",  commit);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
}

async function deleteTime(btn) {
  const th   = btn.closest("th");
  const time = th.dataset.time;
  if (!confirm(`Delete time slot "${time}"?`)) return;

  const colIdx = [...document.querySelectorAll("thead th")].indexOf(th);

  getDays().forEach(day => {
    const key = day + "|" + time;
    if (existingEntries[key]) {
      fetch(API + "/delete_timetable_entry", {
        method: "DELETE",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ user_id: userId, day, time })
      });
      delete existingEntries[key];
    }
  });

  th.remove();
  document.querySelectorAll("tbody tr").forEach(r => r.deleteCell(colIdx - 1 + 1));
  showSaved("🗑️ Time slot removed");
}

/* ── DAY ROWS ────────────────────────────── */

function buildDayCell(day) {
  const td = document.createElement("td");
  td.innerHTML = `
    <div class="day-cell">
      <span class="day-label">${day}</span>
      <div class="day-ctrl">
        <button class="icon-btn edit" title="Rename" onclick="renameDay(this)">✏️</button>
        <button class="icon-btn del"  title="Delete" onclick="deleteDay(this)">✕</button>
      </div>
    </div>`;
  return td;
}

function makeSubjectCell(day, time) {
  const td    = document.createElement("td");
  td.dataset.time = time;
  const input = document.createElement("input");
  input.placeholder = "—";
  input.addEventListener("change", () => autoSave(day, time, input.value));
  td.appendChild(input);
  return td;
}

function makeRow(day) {
  const tr    = document.createElement("tr");
  tr.dataset.day = day;
  tr.appendChild(buildDayCell(day));
  getTimes().forEach(t => tr.appendChild(makeSubjectCell(day, t)));
  return tr;
}

function addDay() {
  const input = document.getElementById("dayInput");
  const day   = input.value.trim();
  if (!day) return alert("Enter a day name");
  if (getDays().includes(day)) return alert("Day already exists");

  document.querySelector("tbody").appendChild(makeRow(day));
  input.value = "";
}

function renameDay(btn) {
  const tr  = btn.closest("tr");
  const old = tr.dataset.day;
  const lbl = tr.querySelector(".day-label");

  const inp = document.createElement("input");
  inp.style.cssText = "width:90px;border:1px solid #f0c0d0;border-radius:8px;padding:2px 6px;font-size:13px;font-family:inherit;";
  inp.value = old;
  lbl.replaceWith(inp);
  inp.focus(); inp.select();

  const commit = async () => {
    const newDay = inp.value.trim() || old;
    tr.dataset.day = newDay;
    const span = document.createElement("span");
    span.className = "day-label";
    span.textContent = newDay;
    inp.replaceWith(span);

    if (newDay === old) return;

    // Migrate server entries
    for (const time of getTimes()) {
      const key  = old + "|" + time;
      const subj = existingEntries[key];
      if (subj) {
        await fetch(API + "/delete_timetable_entry", {
          method: "DELETE",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ user_id: userId, day: old, time })
        });
        await fetch(API + "/add_timetable", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ user_id: userId, day: newDay, time, subject: subj })
        });
        delete existingEntries[key];
        existingEntries[newDay + "|" + time] = subj;
      }
    }

    // Update all inputs in this row to bind new day
    getTimes().forEach((t, i) => {
      const inp2 = tr.cells[i + 1].querySelector("input");
      inp2.onchange = null;
      inp2.addEventListener("change", () => autoSave(newDay, t, inp2.value));
    });

    showSaved("✅ Day renamed");
  };

  inp.addEventListener("blur",  commit);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
}

async function deleteDay(btn) {
  const tr  = btn.closest("tr");
  const day = tr.dataset.day;
  if (!confirm(`Delete row "${day}"?`)) return;

  for (const time of getTimes()) {
    const key = day + "|" + time;
    if (existingEntries[key]) {
      await fetch(API + "/delete_timetable_entry", {
        method: "DELETE",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ user_id: userId, day, time })
      });
      delete existingEntries[key];
    }
  }

  tr.remove();
  showSaved("🗑️ Day removed");
}

/* ── SAVE / LOAD ─────────────────────────── */

async function autoSave(day, time, subject) {
  subject = subject.trim();
  if (!subject) return;

  const key      = day + "|" + time;
  const isUpdate = !!existingEntries[key];

  await fetch(API + (isUpdate ? "/update_timetable" : "/add_timetable"), {
    method: isUpdate ? "PUT" : "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: userId, day, time, subject })
  });

  existingEntries[key] = subject;
  showSaved();
}

function saveTimetable() {
  document.querySelectorAll("tbody tr").forEach(tr => {
    const day = tr.dataset.day;
    getTimes().forEach((t, i) => {
      const subj = tr.cells[i + 1].querySelector("input").value.trim();
      if (subj) autoSave(day, t, subj);
    });
  });
}

function load() {
  const tbody = document.querySelector("tbody");
  DEFAULT_DAYS.forEach(d => tbody.appendChild(makeRow(d)));

  fetch(API + "/timetable/" + userId)
    .then(res => res.json())
    .then(data => {
      data.forEach(({ day, time, subject }) => {
        existingEntries[day + "|" + time] = subject;

        // Add time column if missing
        if (!getTimes().includes(time)) {
          document.querySelector("thead tr").appendChild(buildTimeHeader(time));
          document.querySelectorAll("tbody tr").forEach(r => {
            r.appendChild(makeSubjectCell(r.dataset.day, time));
          });
        }

        // Add day row if missing
        if (!getDays().includes(day)) {
          tbody.appendChild(makeRow(day));
        }

        // Fill in subject
        document.querySelectorAll("tbody tr").forEach(r => {
          if (r.dataset.day === day) {
            const idx = getTimes().indexOf(time) + 1;
            if (r.cells[idx]) r.cells[idx].querySelector("input").value = subject;
          }
        });
      });
    })
    .catch(() => {}); // backend offline – show empty table
}

window.onload = load;
</script>

</body>
</html>
