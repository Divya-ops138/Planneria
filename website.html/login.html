<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Planneria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: lavenderblush; font-family: 'DM Sans', sans-serif; }
    h2   { color: palevioletred; text-align: center; margin-top: 50px; font-weight: bold; }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(219,112,147,0.15);
      padding: 32px;
      background: #fff;
    }

    .pink-btn {
      background-color: palevioletred;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 30px;
      font-weight: bold;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pink-btn:hover { background-color: #c85a82; }

    #errorMsg {
      color: red;
      text-align: center;
      font-size: 0.9rem;
      min-height: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <h2>💕 Welcome to Planneria</h2>

  <div class="container mt-4">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card">
          <h4 class="text-center mb-4" style="color: palevioletred;">Login</h4>

          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
          </div>

          <button class="pink-btn" onclick="login()">Login</button>

          <div id="errorMsg"></div>

          <p class="text-center mt-3" style="font-size:0.9rem;">
            Don't have an account?
            <a href="signup.html" style="color: palevioletred;">Sign up</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:5000";

    function login() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.innerText = "";

      if (!email || !password) {
        errorMsg.innerText = "Please enter both email and password.";
        return;
      }

      fetch(API + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      })
      .then(res => {
        if (!res.ok) throw new Error("Invalid credentials");
        return res.json();
      })
      .then(data => {
        // Store user_id AND name for use across all pages
        localStorage.setItem("user_id",   data.user_id);
        localStorage.setItem("user_name", data.name);
        window.location.href = "index.html";
      })
      .catch(err => {
        console.error("Login error:", err);
        errorMsg.innerText = "Invalid email or password.";
      });
    }
  </script>

</body>
</html>
